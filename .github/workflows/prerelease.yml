name: Prerelease

on:
  workflow_dispatch:
    inputs:
      preid:
        description: Prerelease label
        required: true
        default: next

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout source
        uses: actions/checkout@v4

      - name: 2. Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: 3. Install dependencies
        run: npm ci

      - name: 4. Verify package
        run: npm run check

      - name: 5. Set prerelease version
        env:
          PREID: ${{ inputs.preid }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          const [major, minor, patch] = pkg.version.split('.').map(Number);
          const nextVersion = `${major}.${minor}.${patch + 1}-${process.env.PREID}.${process.env.GITHUB_RUN_NUMBER}`;

          pkg.version = nextVersion;
          writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          console.log(`Publishing ${pkg.name}@${nextVersion}`);
          EOF

      - name: 6. Build prerelease package
        run: npm run build

      - name: 7. Publish prerelease
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag ${{ inputs.preid }} --provenance --access public --no-git-checks
